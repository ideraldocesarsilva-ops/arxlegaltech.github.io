<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Ambiente ARX | Portal de Inteligência Jurídica</title>
    
    <link rel="icon" type="image/png" href="favicon_arx.png">
    <link rel="apple-touch-icon" href="favicon_arx.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    
    <style>
        :root {
            --navy: #080c14; --navy-light: #0f1729;
            --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.12);
            --gold-border: rgba(201,168,76,0.25);
            --silver: #9a9a9a; --text: #e8e8e8;
            --border: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }

        /* GATE CONTAINER */
        #gate-container { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .intro-box { max-width: 800px; width: 90%; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-top: 4rem; width: 100%; }
        
        .choice-card { 
            background: var(--navy-light); border: 1px solid var(--gold-border); 
            padding: 3rem 2rem; border-radius: 4px; cursor: pointer; transition: 0.4s; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            color: var(--text) !important;
        }
        .choice-card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(201,168,76,0.03); }
        .choice-card h3 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.8rem; margin-bottom: 1rem; }

        .btn-action { 
            width: 100%; display: flex; align-items: center; justify-content: center;
            padding: 1.2rem; border: none !important; border-radius: 2px;
            background-color: #c9a84c !important; color: #080c14 !important;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem;
            cursor: pointer; text-decoration: none !important;
        }

        #login-form-area { display: none; text-align: center; max-width: 400px; width: 100%; margin: 0 auto; }
        .login-input { width: 100%; background: var(--navy-light); border: 1px solid var(--gold-border); color: #fff; padding: 1.2rem; margin-top: 2rem; border-radius: 2px; text-align: center; outline: none; letter-spacing: 0.2em; }
        .remember-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 1.5rem; color: var(--silver); font-size: 0.75rem; cursor: pointer; }

        /* APP INTERNO */
        #main-app { flex-grow: 1; display: none; }
        nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; background: rgba(8, 12, 20, 0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); min-height: 115px; }
        
        .nav-logo { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--gold); 
            font-weight: 400; 
            font-size: 1.8rem; 
            line-height: 1.2; 
            max-width: 85%;
            font-style: italic;
        }
        
        section { padding: 13rem 2rem 4rem; max-width: 1100px; margin: 0 auto; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--gold); margin-bottom: 1rem; }
        
        .instruction-box { background: var(--navy-light); border: 1px
