<script>
    // ... (Funções showLoginForm, hideLoginForm, clearVault permanecem iguais)

    async function checkAccess() {
        const inputVal = document.getElementById('access-key').value.trim();
        const rememberMe = document.getElementById('remember-me').checked;
        const error = document.getElementById('error-msg');
        try {
            const [respPaid, respDemo] = await Promise.all([fetch('lista.txt'), fetch('lista-demo.txt')]);
            const [textPaid, textDemo] = await Promise.all([respPaid.text(), respDemo.text()]);
            
            const findInList = (text, input) => {
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                for (let line of lines) {
                    const parts = line.split(';');
                    if (parts[0].trim() === input) {
                        return { 
                            name: parts[1]?.trim() || "Membro", 
                            referrer: parts[2]?.trim() || null,
                            gender: parts[3]?.trim().toUpperCase() || "H" // H como padrão
                        };
                    }
                }
                return null;
            };

            let data = findInList(textPaid, inputVal);
            if (data) { login(inputVal, data.name, data.referrer, data.gender, "paid", rememberMe); return; }

            data = findInList(textDemo, inputVal);
            if (data) { login(inputVal, data.name, data.referrer, data.gender, "demo", rememberMe); return; }

            error.innerText = "Chave não localizada."; error.style.display = 'block';
        } catch (e) { error.innerText = "Erro de conexão."; }
    }

    function login(key, name, referrer, gender, type, persist) {
        const authData = { type, key, name, referrer, gender };
        if (persist) localStorage.setItem('arx_auth_v69', JSON.stringify(authData));
        sessionStorage.setItem('arx_temp_auth', JSON.stringify(authData));
        renderApp(authData);
    }

    function renderApp(data) {
        document.getElementById('gate-container').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        const welcomeMsg = document.getElementById('welcome-msg');
        
        // LÓGICA DE GÊNERO (PNL APLICADA À INTERFACE)
        const isFem = (data.gender === 'M');
        const saudacao = isFem ? "Bem-vinda" : "Bem-vindo";
        const artigo = isFem ? "uma" : "um";
        const possessivo = isFem ? "nossa" : "nosso";
        const substantivo = isFem ? "convidada" : "convidado";

        if (data.type === 'demo') {
            if (data.referrer && data.referrer !== "null" && data.referrer !== "") {
                welcomeMsg.innerText = `${saudacao} ${data.name}! Você é ${artigo} ${substantivo} do Membro ${data.referrer} para experimentar a Análise ARX!`;
            } else {
                welcomeMsg.innerText = `${saudacao} ${data.name}! Você é ${possessivo} ${substantivo} para experimentar a Análise ARX!`;
            }
            // Atualiza links demo
            document.getElementById('link-standard').href = "https://arxlegaltech.fillout.com/standard-demo";
            document.getElementById('link-plus').href = "https://arxlegaltech.fillout.com/plus-demo";
            document.getElementById('link-max').href = "https://arxlegaltech.fillout.com/max-demo";
        } else {
            welcomeMsg.innerText = `${saudacao}, ${data.name}`;
        }
    }

    window.onload = () => { 
        const saved = localStorage.getItem('arx_auth_v69') || sessionStorage.getItem('arx_temp_auth');
        if(saved) renderApp(JSON.parse(saved)); 
    };

    // ... (Mantenha o restante das funções de síntese e drag-and-drop iguais)
</script>
